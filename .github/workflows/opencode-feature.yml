name: OpenCode feature development

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC (does not overlap with nightly AI Feature Generator at 20:00 UTC)
  workflow_dispatch:
    inputs:
      prompt:
        description: "Custom prompt for OpenCode (overrides default file prompt when non-empty)"
        required: false
        type: string
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: opencode-feature
  cancel-in-progress: true

jobs:
  opencode:
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode'))) ||
      (github.event_name == 'pull_request_review_comment' && (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode')))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Resolve OpenCode prompt
        id: opencode-prompt
        env:
          DISPATCH_PROMPT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prompt || '' }}
        run: |
          set -euo pipefail
          DELIM="OPENCODE_PROMPT_EOF"
          if [ "${{ github.event_name }}" = "issue_comment" ] || [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            printf 'text=%s\n' '' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          {
            printf 'text<<%s\n' "$DELIM"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${DISPATCH_PROMPT}" ]; then
              printf '%s\n' "${DISPATCH_PROMPT}"
            else
              cat .github/opencode/feature-dev-prompt.md
            fi
            printf '%s\n' "$DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: openai/${{ vars.OPENCODE_MODEL || 'gpt-5.4' }}
          use_github_token: "true"
          prompt: ${{ steps.opencode-prompt.outputs.text }}
