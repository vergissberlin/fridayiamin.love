name: Nightly Copilot Feature Pipeline

on:
  schedule:
    # 21:00 Europe/Berlin:
    # - 20:00 UTC during CET (winter)
    # - 19:00 UTC during CEST (summer)
    - cron: "0 20 * * *"
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write
  models: read

concurrency:
  group: nightly-copilot-feature
  cancel-in-progress: true

jobs:
  nightly-feature:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ask GitHub Models for feature patch
        id: copilot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT_FILE="/tmp/copilot-output.txt"

          cat > /tmp/feature-request.json << 'EOF'
          {
            "model": "openai/gpt-4o-mini",
            "messages": [
              {
                "role": "system",
                "content": "You are the AI maintainer for fridayiamin.love, a fan website celebrating The Cure and the song \"Friday I'm in Love\". You must output a git patch (diff format) implementing exactly one small feature enhancement. Output ONLY the patch in a fenced code block, no explanations."
              },
              {
                "role": "user",
                "content": "Task: Propose and implement exactly one small-to-medium feature enhancement for this Next.js/TypeScript website about The Cure's song \"Friday I'm in Love\".\n\nFeature pool (choose one):\n- Add or improve a Spotify player section for \"Friday I'm in Love\"\n- Add curated links to fan pages/resources\n- Add a MIDI resources section\n- Add a guitar tabs/chords section\n- Improve one existing section with stronger fan-focused content\n\nHard requirements:\n- Do not remove existing sections\n- Keep changes focused and non-destructive\n- Keep visual style aligned with neon/chaotic 90s aesthetic\n- Keep code compile-safe and lint-safe\n- Output format: ONLY a git patch in ```diff syntax, no explanations outside the code block\n\nCurrent project structure:\n$(find . -type f -name \"*.tsx\" -o -name \"*.ts\" | grep -v node_modules | grep -v .next | head -30)\n\nPackage.json dependencies:\n$(cat package.json | grep -A 50 '\"dependencies\"' | head -40)"
              }
            ],
            "temperature": 0.7,
            "max_tokens": 8000
          }
          EOF

          RESPONSE=$(curl -s -L "https://models.github.ai/inference/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d @/tmp/feature-request.json)

          echo "$RESPONSE" > "$OUTPUT_FILE"

          if echo "$RESPONSE" | grep -q '"content"'; then
            echo "$RESPONSE" | python3 -c '
              import json
              import sys
              import re

              try:
                  data = json.load(sys.stdin)
                  content = data.get("choices", [{}])[0].get("message", {}).get("content", "")
                  if content:
                      # Extract diff from code block
                      match = re.search(r"```diff\s*(.*?)```", content, re.DOTALL)
                      if not match:
                          match = re.search(r"```\s*(.*?)```", content, re.DOTALL)
                      if match:
                          patch = match.group(1).strip()
                          with open("/tmp/copilot.patch", "w") as f:
                              f.write(patch + "\n")
                      else:
                          print("No patch found in response")
                          print(content[:500])
                  else:
                      print("No content in response")
              except Exception as e:
                  print(f"Error: {e}")
                  print("$RESPONSE"[:500])
            '
          else
            echo "API call failed:"
            cat "$OUTPUT_FILE"
          fi

      - name: Apply generated patch
        run: |
          if [ -f "/tmp/copilot.patch" ] && [ -s "/tmp/copilot.patch" ]; then
            echo "Applying patch..."
            cat /tmp/copilot.patch
            git apply --whitespace=fix /tmp/copilot.patch || echo "Patch apply failed, trying alternative..."
          else
            echo "No patch generated. Skipping apply."
          fi

      - name: Validate generated changes
        run: |
          pnpm lint || true
          pnpm typecheck || true
          pnpm build || true

      - name: Commit and push if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .

            DIFF_SUMMARY="$(git diff --cached -- . ':(exclude)pnpm-lock.yaml')"

            # Generate commit message using GitHub Models
            COMMIT_MSG_FILE="/tmp/commit-msg.txt"
            cat > /tmp/commit-request.json << EOF
            {
              "model": "openai/gpt-4o-mini",
              "messages": [
                {
                  "role": "system",
                  "content": "You generate Conventional Commit messages. Output ONLY the commit subject line in format: <type>: <subject>. Types: feat, fix, chore, docs, refactor, perf, test, style, ci."
                },
                {
                  "role": "user",
                  "content": "Generate a concise commit message for these changes:\n$DIFF_SUMMARY"
                }
              ],
              "temperature": 0.3,
              "max_tokens": 100
            }
            EOF

            COMMIT_RESPONSE=$(curl -s -L "https://models.github.ai/inference/chat/completions" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -d @/tmp/commit-request.json)

            COMMIT_MESSAGE=$(echo "$COMMIT_RESPONSE" | python3 -c '
              import json, sys
              try:
                  data = json.load(sys.stdin)
                  msg = data.get("choices", [{}])[0].get("message", {}).get("content", "").strip()
                  print(msg)
              except:
                  print("")
            ' 2>/dev/null)

            if printf '%s' "$COMMIT_MESSAGE" | grep -Eq '^(feat|fix|chore|docs|refactor|perf|test|style|ci): .+'; then
              git commit -m "$COMMIT_MESSAGE"
            else
              git commit -m "feat: add nightly AI-generated friday i'm in love fan features"
            fi

            git push origin main
          else
            echo "No changes generated. Skipping commit."
          fi
