name: Friday AI Feature

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:

permissions:
  contents: write
  models: read

jobs:
  friday-ai:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Feature
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/prompt.json << 'EOF'
          {"model":"openai/gpt-4o-mini","messages":[{"role":"system","content":"You are an AI developer. Output ONLY a git patch in ```diff code block."},{"role":"user","content":"Add src/friday.txt with 'Friday I am in Love'. Output only the diff."}],"temperature":0.7}
          EOF
          RESPONSE=$(curl -s -L "https://models.github.ai/inference/chat/completions" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -d @/tmp/prompt.json)
          echo "$RESPONSE" > /tmp/r.json
          python3 -c "
          import json,re
          d=json.load(open('/tmp/r.json'))
          c=d.get('choices',[{}])[0].get('message',{}).get('content','')
          m=re.search(r'code diff',c,re.DOTALL)
          if m: open('/tmp/p.patch','w').write(m.group(1).strip()+'\n')
          print('ok' if m else 'fail')
          "

      - name: Apply
        run: |
          if [ -f /tmp/p.patch ]; then
            git apply --whitespace=fix /tmp/p.patch && echo "Applied" || echo "Failed"
          fi

      - name: Validate
        run: pnpm lint || true; pnpm typecheck || true; pnpm build || true

      - name: Commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add . && git commit -m "feat: AI-generated Friday content" && git push origin main || echo "No changes"
          fi