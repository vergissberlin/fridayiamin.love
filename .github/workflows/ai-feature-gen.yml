name: AI Feature Generator

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      provider:
        description: "AI provider (copilot | openai | opencode)"
        required: false
        default: openai
        type: choice
        options:
          - openai
          - copilot
          - opencode
      debug_ai_feature_gen:
        description: "Enable debug logs for AI feature generation"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  models: read
  id-token: write
  actions: write
  packages: write
  pull-requests: write

concurrency:
  group: ai-feature-gen
  cancel-in-progress: true

jobs:
  generate-feature:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install opencode CLI (if selected)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.provider == 'opencode' }}
        run: |
          set -euo pipefail
          npm install -g opencode-ai
          opencode --version

      - name: Generate feature patch
        id: generate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1' }}
          GITHUB_MODELS_MODEL: ${{ vars.GITHUB_MODELS_MODEL || 'openai/gpt-5.4' }}
          OPENCODE_MODEL: ${{ vars.OPENCODE_MODEL || 'gpt-4.1' }}
          OPENCODE_CLI_CMD: ${{ secrets.OPENCODE_CLI_CMD || vars.OPENCODE_CLI_CMD || '' }}
          DEBUG_AI_FEATURE_GEN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.debug_ai_feature_gen || 'false' }}
          AI_PROVIDER: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.provider || 'openai' }}
          AI_MAX_REPAIR_ATTEMPTS: ${{ vars.AI_MAX_REPAIR_ATTEMPTS || '3' }}
        run: |
          set -euo pipefail

          if [ "${AI_PROVIDER}" != "copilot" ] && [ "${AI_PROVIDER}" != "openai" ] && [ "${AI_PROVIDER}" != "opencode" ]; then
            echo "Unsupported AI provider: ${AI_PROVIDER}. Allowed values: copilot, openai, opencode."
            exit 1
          fi

          echo "Using AI provider: ${AI_PROVIDER}"
          echo "Max repair attempts: ${AI_MAX_REPAIR_ATTEMPTS}"

          run_provider_request() {
            if [ "${AI_PROVIDER}" = "copilot" ]; then
              HTTP_CODE=$(curl -sS -L -o /tmp/response.json -w "%{http_code}" "https://models.github.ai/inference/chat/completions" \
                -H "Content-Type: application/json" \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                -d @/tmp/feature-request.json)
              return 0
            fi

            if [ "${AI_PROVIDER}" = "openai" ]; then
              if [ -z "${OPENAI_API_KEY:-}" ]; then
                echo "Missing required secret: OPENAI_API_KEY for provider=openai"
                exit 1
              fi
              HTTP_CODE=$(curl -sS -L -o /tmp/response.json -w "%{http_code}" "https://api.openai.com/v1/chat/completions" \
                -H "Content-Type: application/json" \
                -H "Authorization: Bearer $OPENAI_API_KEY" \
                -d @/tmp/feature-request.json)
              return 0
            fi

            if [ "${AI_PROVIDER}" = "opencode" ]; then
              if [ -z "${OPENCODE_CLI_CMD:-}" ]; then
                echo "Missing OPENCODE_CLI_CMD secret/variable for provider=opencode."
                echo "Example: OPENCODE_CLI_CMD='opencode run --input /tmp/feature-request.json'"
                exit 1
              fi
              rm -f /tmp/opencode-response.txt
              eval "${OPENCODE_CLI_CMD}" > /tmp/opencode-response.txt
              node .github/scripts/ai-feature-gen.mjs normalize-opencode /tmp/opencode-response.txt
              HTTP_CODE=200
              return 0
            fi
          }

          validate_generated_page() {
            set +e
            pnpm lint > /tmp/ai-feature-lint.log 2>&1
            local lint_exit=$?
            pnpm typecheck > /tmp/ai-feature-typecheck.log 2>&1
            local typecheck_exit=$?
            pnpm build > /tmp/ai-feature-build.log 2>&1
            local build_exit=$?
            set -e

            if [ $lint_exit -eq 0 ] && [ $typecheck_exit -eq 0 ] && [ $build_exit -eq 0 ]; then
              return 0
            fi

            echo "Validation failed (lint=$lint_exit, typecheck=$typecheck_exit, build=$build_exit)"
            return 1
          }

          generate_or_repair() {
            local attempt="$1"
            if [ "$attempt" -eq 1 ]; then
              node .github/scripts/ai-feature-gen.mjs build-request full "${AI_PROVIDER}"
              echo "Request payload size (full): $(wc -c < /tmp/feature-request.json) bytes"
            else
              node .github/scripts/ai-feature-gen.mjs build-repair-request "${AI_PROVIDER}" \
                /tmp/ai-feature-lint.log \
                /tmp/ai-feature-typecheck.log \
                /tmp/ai-feature-build.log
              echo "Request payload size (repair): $(wc -c < /tmp/feature-request.json) bytes"
            fi

            run_provider_request

            if [ "$HTTP_CODE" -eq 413 ] && [ "${AI_PROVIDER}" != "opencode" ] && [ "$attempt" -eq 1 ]; then
              echo "Model API request returned 413 (payload too large), retrying initial request with slim context..."
              node .github/scripts/ai-feature-gen.mjs build-request slim "${AI_PROVIDER}"
              echo "Request payload size (slim): $(wc -c < /tmp/feature-request.json) bytes"
              run_provider_request
            fi

            if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
              echo "Model API request failed with status $HTTP_CODE (provider=${AI_PROVIDER})"
              exit 1
            fi

            if [ "${DEBUG_AI_FEATURE_GEN}" = "true" ]; then
              echo "Debug: model API request succeeded with status $HTTP_CODE"
            fi

            node .github/scripts/ai-feature-gen.mjs apply-response
          }

          # Keep backup to allow clean restore if all attempts fail.
          cp src/app/page.tsx /tmp/page.tsx.backup
          attempt=1
          max_attempts="${AI_MAX_REPAIR_ATTEMPTS}"
          success="false"

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "AI generation attempt ${attempt}/${max_attempts}"
            generate_or_repair "$attempt"

            if validate_generated_page; then
              echo "Validation passed on attempt ${attempt}."
              success="true"
              break
            fi

            echo "Validation failed on attempt ${attempt}. Preparing repair attempt."
            attempt=$((attempt + 1))
          done

          if [ "$success" != "true" ]; then
            echo "All attempts failed. Restoring previous src/app/page.tsx and skipping commit."
            cp /tmp/page.tsx.backup src/app/page.tsx
            exit 0
          fi

      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "feat: add AI-generated Friday I'm in Love content"
            git push origin main
          else
            echo "No changes"
          fi
