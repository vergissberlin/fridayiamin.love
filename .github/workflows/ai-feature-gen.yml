name: AI Feature Generator

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      provider:
        description: "AI provider (copilot | openai | opencode)"
        required: false
        default: openai
        type: choice
        options:
          - openai
          - copilot
          - opencode
      debug_ai_feature_gen:
        description: "Enable debug logs for AI feature generation"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  models: read
  id-token: write
  actions: write
  issues: write
  packages: write
  pull-requests: write

concurrency:
  group: ai-feature-gen
  cancel-in-progress: true

jobs:
  generate-feature:
    runs-on: ubuntu-latest

    steps:
      # Use RELEASE_PLEASE_TOKEN (PAT) when set so `git push` triggers other workflows
      # (pushes with the default GITHUB_TOKEN do not fire `on: push` workflows — Release
      # Please would never run after bot commits). Falls back to github.token if unset.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install opencode CLI (if selected)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.provider == 'opencode' }}
        run: |
          set -euo pipefail
          npm install -g opencode-ai
          opencode --version

      - name: Generate feature patch
        id: generate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1' }}
          GITHUB_MODELS_MODEL: ${{ vars.GITHUB_MODELS_MODEL || 'openai/gpt-5.4' }}
          OPENCODE_MODEL: ${{ vars.OPENCODE_MODEL || 'gpt-4.1' }}
          OPENCODE_CLI_CMD: ${{ secrets.OPENCODE_CLI_CMD || vars.OPENCODE_CLI_CMD || '' }}
          DEBUG_AI_FEATURE_GEN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.debug_ai_feature_gen || 'false' }}
          AI_PROVIDER: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.provider || 'openai' }}
          AI_MAX_REPAIR_ATTEMPTS: ${{ vars.AI_MAX_REPAIR_ATTEMPTS || '3' }}
          # Raised default in script (16k); override via repo variable if the model/API allows higher completion limits.
          AI_MAX_OUTPUT_TOKENS: ${{ vars.AI_MAX_OUTPUT_TOKENS || '16384' }}
        run: node .github/scripts/ai-feature-gen-runner.mjs

      - name: Notify on failure
        if: failure() && steps.generate.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "🚨 AI Feature Generator failed after all attempts ($(date -u +'%Y-%m-%d'))" \
            --body "The AI feature generator workflow failed after exhausting all repair attempts.

          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Triggered by:** \`${{ github.event_name }}\`
          **Branch:** \`${{ github.ref_name }}\`
          **Provider:** \`${{ github.event_name == 'workflow_dispatch' && github.event.inputs.provider || 'openai' }}\`

          Please check the workflow logs for details." \
            --label "bug"

      - name: Commit and push
        env:
          GIT_PUSH_BRANCH: ${{ github.ref_name }}
        run: node .github/scripts/ai-feature-commit.mjs
