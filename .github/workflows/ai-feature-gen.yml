name: AI Feature Generator

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      debug_ai_feature_gen:
        description: "Enable debug logs for AI feature generation"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  models: read

concurrency:
  group: ai-feature-gen
  cancel-in-progress: true

jobs:
  generate-feature:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate feature patch
        id: generate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG_AI_FEATURE_GEN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.debug_ai_feature_gen || 'false' }}
        run: |
          set -euo pipefail

          # Build request payload from nightly feature prompt + current app context
          node .github/scripts/ai-feature-gen.mjs build-request

          HTTP_CODE=$(curl -sS -L -o /tmp/response.json -w "%{http_code}" "https://models.github.ai/inference/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d @/tmp/feature-request.json)

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Model API request failed with status $HTTP_CODE"
            exit 1
          fi

          if [ "${DEBUG_AI_FEATURE_GEN}" = "true" ]; then
            echo "Debug: model API request succeeded with status $HTTP_CODE"
          fi

          # Convert model response into concrete file changes
          node .github/scripts/ai-feature-gen.mjs apply-response

      - name: Validate
        run: |
          pnpm lint || true
          pnpm typecheck || true
          pnpm build || true

      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "feat: add AI-generated Friday I'm in Love content"
            git push origin main
          else
            echo "No changes"
          fi
