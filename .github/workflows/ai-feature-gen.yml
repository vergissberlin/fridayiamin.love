name: AI Feature Generator

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:

permissions:
  contents: write
  models: read

concurrency:
  group: ai-feature-gen
  cancel-in-progress: true

jobs:
  generate-feature:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate feature patch
        id: generate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Build request payload from nightly feature prompt + current app context
          python3 << 'PYEOF'
          import json
          from pathlib import Path

          prompt_path = Path('.github/copilot/nightly-feature-prompt.md')
          prompt = prompt_path.read_text(encoding='utf-8')

          # Collect key project files as context for the model
          context_files = [
              Path('src/app/page.tsx'),
              Path('src/app/page.module.css'),
              Path('README.md'),
          ]

          context_parts = []
          for file_path in context_files:
              if file_path.is_file():
                  try:
                      content = file_path.read_text(encoding='utf-8')
                  except Exception:
                      continue
                  # Keep simple separators so the model can target specific files
                  context_parts.append(f"--- FILE: {file_path.as_posix()} ---\n{content}")

          context = "\n\n".join(context_parts)

          messages = [
              {
                  "role": "system",
                  "content": prompt,
              }
          ]

          if context:
              messages.append(
                  {
                      "role": "user",
                      "content": "Here is the current application context. Propose and apply exactly one enhancement as specified.\n\n" + context,
                  }
              )

          payload = {
              "model": "openai/gpt-4o-mini",
              "messages": messages,
              "temperature": 0.4,
              "max_tokens": 6000,
          }

          Path('/tmp/feature-request.json').write_text(json.dumps(payload), encoding='utf-8')
          PYEOF

          RESPONSE=$(curl -s -L "https://models.github.ai/inference/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d @/tmp/feature-request.json)

          echo "$RESPONSE" > /tmp/response.json

          # Convert model response into concrete file changes
          python3 << 'PYEOF'
          import json
          import re
          from pathlib import Path

          data = json.load(open("/tmp/response.json"))
          content = data.get("choices", [{}])[0].get("message", {}).get("content", "")

          # Extract raw TSX from optional fences
          m = re.search(r"```(?:tsx|typescript|jsx)?\s*([\s\S]*)```", content)
          if m:
              content = m.group(1)

          # If the model returns no content, do nothing
          if not content.strip():
              print("Model returned empty content; nothing to do.")
              raise SystemExit(0)

          target = Path("src/app/page.tsx")
          target.write_text(content, encoding="utf-8")
          print("Updated files:", target.as_posix())
          PYEOF

      - name: Validate
        run: |
          pnpm lint || true
          pnpm typecheck || true
          pnpm build || true

      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "feat: add AI-generated Friday I'm in Love content"
            git push origin main
          else
            echo "No changes"
          fi
